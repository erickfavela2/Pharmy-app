<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>💊 Pharmy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="profile-overlay" class="profile-overlay" style="display:none">
  <div class="profile-overlay-inner">
    <div class="profile-overlay-logo">💊 Pharmy</div>
    <div id="profile-overlay-content"></div>
  </div>
</div>

<div id="profile-dropdown" class="profile-dropdown" style="display:none"></div>

<div class="header">
  <button id="avatar-btn" class="avatar-btn" onclick="toggleProfileDropdown()">
    <div id="avatar-circle" class="avatar-circle">?</div>
  </button>
  <div style="flex:1;text-align:center"><h1>💊 Pharmy</h1></div>
  <div id="streak-pill" class="streak-pill" style="display:none">🔥 0</div>
</div>

<div class="cat-bar">
  <div class="cat-bar-inner">
    <button class="cat-btn" onclick="toggleCatDropdown()">Categories ▾</button>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-flash" onclick="setMode('flash')">Flashcards</button>
      <button class="mode-btn" id="btn-quiz" onclick="setMode('quiz')">Quiz</button>
    </div>
    <div class="cat-dropdown" id="cat-dropdown"></div>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div id="flashcard-mode"></div>
<div id="quiz-mode" style="display:none"></div>

<script src="database.js"></script>
<script src="app.js"></script>
</body>
</html>
